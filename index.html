<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>A Heartfelt Sorry</title>
  <link href="https://fonts.googleapis.com/css2?family=Corinthia:wght@400;700&family=Crafty+Girls&family=Kalam:wght@300;400;700&family=Lilita+One&family=Noto+Sans+Devanagari:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { height: 100%; }

    body {
      background-color: rgb(255, 216, 235);
      display: flex;
      justify-content: center;
      height: 100dvh;
      height: 100vh;
      overflow: hidden;
      font-family: 'Kalam', 'Noto Sans Devanagari', cursive;
    }

    .card {
      width: 100%;
      max-width: 620px;
      display: flex;
      flex-direction: column;
      padding: max(env(safe-area-inset-top), 16px) 16px max(env(safe-area-inset-bottom), 12px);
      overflow: hidden;
    }

    /* ── TOP ── */
    .top-area {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      padding-bottom: 8px;
    }

    .sticker-top {
      width: 88px;
      flex-shrink: 0;
      object-fit: contain;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.08));
    }

    .headline-box {
      background: white;
      border-radius: 16px;
      padding: 12px 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      flex: 1;
    }

    .headline-box p {
      /* Crafty Girls for the headline */
      font-family: 'Crafty Girls', cursive;
      font-size: 1.2rem;
      color: #c0396d;
      line-height: 1.55;
    }

    /* ── SKIP ── */
    .skip-wrap {
      display: flex;
      justify-content: flex-end;
      padding: 5px 0 6px;
      flex-shrink: 0;
    }

    .skip-btn {
      background: transparent;
      border: 1.5px solid #d63f7b;
      color: #d63f7b;
      border-radius: 50px;
      padding: 3px 14px;
      font-family: 'Kalam', cursive;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .skip-btn:hover, .skip-btn:active { background: #d63f7b; color: white; }
    .skip-btn.hidden { visibility: hidden; pointer-events: none; }

    /* ── SCROLLABLE LETTER ── */
    .letter-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 2px 4px 8px;
      scrollbar-width: thin;
      scrollbar-color: #f4a0c0 transparent;
      min-height: 0;
    }
    .letter-scroll::-webkit-scrollbar { width: 3px; }
    .letter-scroll::-webkit-scrollbar-thumb { background: #f4a0c0; border-radius: 4px; }

    .salutation {
      font-family: 'Kalam', 'Noto Sans Devanagari', cursive;
      font-size: 1rem;
      font-weight: 700;
      color: #333;
      margin-bottom: 12px;
      padding: 0 2px;
    }

    .para-block {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 14px;
      opacity: 0;
      transition: opacity 0.35s;
      padding: 0 2px;
    }
    .para-block.visible { opacity: 1; }

    .bullet-dot {
      flex-shrink: 0;
      width: 6px; height: 6px;
      background: #d63f7b;
      border-radius: 50%;
      margin-top: 10px;
    }

    .para-text {
      font-family: 'Kalam', 'Noto Sans Devanagari', cursive;
      font-size: 0.97rem;
      font-weight: 400;
      color: #2d2d2d;
      line-height: 1.9;
      flex: 1;
    }

    .letter-sign {
      opacity: 0;
      transition: opacity 0.4s;
      padding: 8px 2px 4px;
      font-family: 'Kalam', cursive;
      font-size: 1rem;
      color: #444;
      line-height: 1.7;
    }
    .letter-sign.visible { opacity: 1; }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: #d63f7b;
      margin-left: 1px;
      vertical-align: middle;
      animation: blink 0.7s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── BOTTOM ── */
    .bottom-area {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      padding-top: 8px;
      flex-shrink: 0;
      border-top: 1px solid rgba(214,63,123,0.15);
      margin-top: 4px;
      min-height: 68px;
    }

    .sticker-bottom {
      width: 56px;
      object-fit: contain;
      filter: drop-shadow(0 3px 6px rgba(0,0,0,0.08));
    }

    /* Corinthia signature font for handle */
    .handle-text {
      font-family: 'Corinthia', cursive;
      font-size: 1.9rem;
      font-weight: 700;
      color: #c0396d;
      line-height: 1;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
<div class="card">

  <!-- TOP -->
  <div class="top-area">
    <img class="sticker-top"
      src="https://raw.githubusercontent.com/appnazdeek/apology-letter/main/one.png"
      alt="sorry ghost" />
    <div class="headline-box">
      <p>A heartfelt sorry,<br/>I meant no hurt.</p>
    </div>
  </div>

  <!-- SKIP -->
  <div class="skip-wrap">
    <button class="skip-btn" id="skipBtn">Skip ⏭</button>
  </div>

  <!-- LETTER -->
  <div class="letter-scroll" id="letterScroll">
    <p class="salutation">नमस्ते आंटी जी, मैं राकेशसिंह</p>

    <div class="para-block" id="p0"><span class="bullet-dot"></span><span class="para-text" id="t0"></span></div>
    <div class="para-block" id="p1"><span class="bullet-dot"></span><span class="para-text" id="t1"></span></div>
    <div class="para-block" id="p2"><span class="bullet-dot"></span><span class="para-text" id="t2"></span></div>
    <div class="para-block" id="p3"><span class="bullet-dot"></span><span class="para-text" id="t3"></span></div>
    <div class="para-block" id="p4"><span class="bullet-dot"></span><span class="para-text" id="t4"></span></div>
    <div class="para-block" id="p5"><span class="bullet-dot"></span><span class="para-text" id="t5"></span></div>
    <div class="para-block" id="p6"><span class="bullet-dot"></span><span class="para-text" id="t6"></span></div>
    <div class="para-block" id="p7"><span class="bullet-dot"></span><span class="para-text" id="t7"></span></div>
    <div class="para-block" id="p8"><span class="bullet-dot"></span><span class="para-text" id="t8"></span></div>
    <div class="para-block" id="p9"><span class="bullet-dot"></span><span class="para-text" id="t9"></span></div>

    <div class="letter-sign" id="letterSign">
      धन्यवाद,<br/>राकेश
    </div>
  </div>

  <!-- BOTTOM -->
  <div class="bottom-area">
    <img class="sticker-bottom"
      src="https://raw.githubusercontent.com/appnazdeek/apology-letter/main/two.png"
      alt="ghost with flower" />
    <span class="handle-text">@rakeshsingh.tce</span>
  </div>

</div>

<script>
  const parts = [
    "सबसे पहले मैं आपसे दिल से माफी मांगना चाहता हूँ। कुछ महीने पहले मेरे इंस्टाग्राम अकाउंट पर एक AI-generated फोटो थी जिसमें आपकी बेटी की फोटो का इस्तेमाल हो गया था। मुझे समझ है कि यह चीज आपको बिल्कुल अच्छी नहीं लगी होगी और इससे आपको गुस्सा या असहज महसूस हुआ होगा। इसके लिए मैं sincerely आपसे sorry कहना चाहता हूँ।",
    "मैं एक बात साफ करना चाहता हूँ कि मेरा intention बिल्कुल भी गलत नहीं था। वह फोटो मैंने कहीं भी publicly share नहीं की थी। मेरा Instagram account private है और वहाँ practically कोई और access भी नहीं था। वह बस मेरे अकाउंट पर एक पोस्ट के रूप में पड़ी हुई थी। फिर भी अगर उस वजह से आपको या आपके परिवार को बुरा लगा, तो उसकी पूरी responsibility मैं लेता हूँ और उसके लिए दिल से माफी मांगता हूँ।",
    "आंटी जी, मैं आपकी बेटी और आपके पूरे परिवार की बहुत respect करता हूँ। मैं ऐसा लड़का नहीं हूँ जो आजकल के कुछ temporary relationships की तरह किसी के साथ थोड़े समय के लिए जुड़कर बाद में सब खत्म कर दे। मेरा mindset वैसा बिल्कुल नहीं है। अगर मेरे मन में किसी के लिए सम्मान या पसंद होती है तो वह चीज serious और respectful तरीके से ही होती है, कोई time-pass या temporary feeling नहीं होती।",
    "मैं आपको अपने बारे में थोड़ा सा बताना चाहता हूँ ताकि आपको समझ आ सके कि मैं कैसा इंसान हूँ। मैं अभी अपने career पर focus कर रहा हूँ और पिछले काफी समय से अपने काम और अपने future को बनाने में लगा हुआ हूँ। मैं software engineering और technology से जुड़ा हुआ हूँ और अपना startup build करने पर काम कर रहा हूँ। मैं एक first-generation entrepreneur बनने की कोशिश कर रहा हूँ, इसलिए अभी मेरी life का बड़ा हिस्सा struggle, learning और hard work में जा रहा है।",
    "मेरी lifestyle भी simple है। मुझे ना smoking की आदत है, ना drinking की और ना ही किसी गलत संगत में रहने की आदत है। मैं अपना ज़्यादातर समय सीखने, काम करने और अपने skills को improve करने में लगाता हूँ। गाँव में रहने के बावजूद मैं हमेशा कोशिश करता हूँ कि मेरा mindset positive और progressive रहे।",
    "आपकी बेटी की बहन अंशिका से मेरी कुछ समय तक chat हुई थी, जिसमें मैंने उन्हें अपने बारे में काफी कुछ बताया था। उन्होंने मुझसे कई बातें पूछी थीं और मैंने उन्हें honestly जवाब दिया था। इसलिए अगर कभी आपको मेरे बारे में कुछ जानना हो तो आप उनसे भी पूछ सकती हैं, क्योंकि उन्होंने मेरे साथ काफी बातचीत की है।",
    "एक और बात मैं बिल्कुल साफ करना चाहता हूँ। फिलहाल मेरा ऐसा कोई plan नहीं है कि मैं अभी किसी relationship के बारे में बात करूँ या किसी को किसी तरह की परेशानी में डालूँ। अभी मेरी priority सिर्फ अपना career बनाना, अपने परिवार की स्थिति को बेहतर करना और खुद को financially और personally strong बनाना है।",
    "इसलिए अभी मैं सिर्फ अपनी गलती के लिए आपसे माफी मांगना चाहता हूँ। भविष्य में जब मैं अपनी life में stable हो जाऊँगा, अपने काम में successful हो जाऊँगा और जब समय सही होगा, तभी मैं किसी भी बात को लेकर आगे सोचूँगा। अभी के समय में मेरा focus सिर्फ मेहनत करना और खुद को बेहतर बनाना है।",
    "आंटी जी, अगर मेरे इस message में लिखी किसी भी बात से आपको बुरा लगे या आपको ऐसा लगे कि मुझे यह message नहीं भेजना चाहिए था, तो उसके लिए भी मैं पहले से ही माफी चाहता हूँ। मेरा मकसद सिर्फ इतना है कि आपके मन में अगर मेरे लिए कोई गलतफहमी बन गई है तो उसे clear कर सकूँ।",
    "आपका गुस्सा बिल्कुल समझ में आता है और आपकी जगह कोई भी माता-पिता होते तो शायद वही महसूस करते। इसलिए मैं एक बार फिर sincerely आपसे sorry कहना चाहता हूँ।"
  ];

  const TOTAL = parts.length;
  let isTyping = true;
  let typeTimeout = null;
  const scroll = document.getElementById('letterScroll');

  // ── Scroll control logic ──
  // userTouching = finger is currently on screen
  // autoScrollEnabled = should we auto-scroll on each tick
  let userTouching = false;
  let autoScrollEnabled = true;

  // Touch start → immediately stop auto-scroll
  scroll.addEventListener('touchstart', () => {
    userTouching = true;
    autoScrollEnabled = false;
  }, { passive: true });

  // Touch end → resume auto-scroll (no jump, typing continues from where it is)
  scroll.addEventListener('touchend', () => {
    userTouching = false;
    autoScrollEnabled = true;
  }, { passive: true });

  // Desktop mouse wheel → stop while scrolling, resume after 1s idle
  let wheelTimer = null;
  scroll.addEventListener('wheel', () => {
    autoScrollEnabled = false;
    clearTimeout(wheelTimer);
    wheelTimer = setTimeout(() => { autoScrollEnabled = true; }, 1000);
  }, { passive: true });

  function autoScroll() {
    if (!autoScrollEnabled) return;
    scroll.scrollTop = scroll.scrollHeight;
  }

  function showAllInstant() {
    clearTimeout(typeTimeout);
    isTyping = false;
    document.getElementById('skipBtn').classList.add('hidden');
    for (let i = 0; i < TOTAL; i++) {
      const textEl = document.getElementById('t' + i);
      const cur = textEl.querySelector('.cursor');
      if (cur) cur.remove();
      textEl.textContent = parts[i];
      document.getElementById('p' + i).classList.add('visible');
    }
    document.getElementById('letterSign').classList.add('visible');
    scroll.scrollTop = scroll.scrollHeight;
  }

  function typeParagraph(idx) {
    if (!isTyping) return;
    if (idx >= TOTAL) {
      const lastText = document.getElementById('t' + (TOTAL - 1));
      const cur = lastText.querySelector('.cursor');
      if (cur) cur.remove();
      document.getElementById('skipBtn').classList.add('hidden');
      document.getElementById('letterSign').classList.add('visible');
      isTyping = false;
      return;
    }

    const block = document.getElementById('p' + idx);
    const textEl = document.getElementById('t' + idx);
    const fullText = parts[idx];
    let charIdx = 0;

    block.classList.add('visible');
    textEl.innerHTML = '<span class="cursor"></span>';

    function tick() {
      if (!isTyping) return;
      if (charIdx < fullText.length) {
        textEl.querySelector('.cursor').insertAdjacentText('beforebegin', fullText[charIdx]);
        charIdx++;
        const ch = fullText[charIdx - 1];
        const delay = /[।]/.test(ch) ? 190 : /[,]/.test(ch) ? 90 : /[ ]/.test(ch) ? 28 : 42;
        typeTimeout = setTimeout(tick, delay);
        autoScroll();
      } else {
        const cur = textEl.querySelector('.cursor');
        if (cur) cur.remove();
        typeTimeout = setTimeout(() => typeParagraph(idx + 1), 320);
      }
    }
    tick();
  }

  document.getElementById('skipBtn').addEventListener('click', showAllInstant);
  typeParagraph(0);
</script>
</body>
                                                                      </html>
